default_branch = "main"
auto_index = true
mode = "compat"

[context]
default_budget = 8000

[world]
preset = "Native"

[execution]
external_tools = "workspace"

[remote]
refs = []

[remote]
default = "kinlab"

[[remote.refs]]
name = "kinlab"
host = "kinlab"
transport = "native-kin"
url = "https://kinlab.ai/api/orgs/firelock-ai/repos/kin-editor"
publish_review_state = false
publish_proofs = false
