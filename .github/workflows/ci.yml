name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run lint
      - run: npm test
      - name: Audit (high/critical)
        run: npm audit --audit-level=high

  release-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - name: Verify release policy metadata
        run: node ./scripts/release-policy.mjs verify
      - name: Gate release-impacting version bumps
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=50 origin "$BASE_REF"
          node ./scripts/release-policy.mjs check-bump --base FETCH_HEAD --head HEAD
