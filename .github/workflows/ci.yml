name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run compile
      - run: npm run lint
      - run: npm test
      - name: Audit (high/critical)
        run: npm audit --audit-level=high
